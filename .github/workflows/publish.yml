name: Publish to PyPI

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"    # real release: bumpver tags like 3.1.4 (no "v" prefix)
  workflow_dispatch:              # dry-run: "Run workflow" button -> publishes to TestPyPI

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - uses: actions/upload-artifact@v4    # hand the built dist/ to the publish jobs
        with:
          name: dist
          path: dist/

  testpypi:
    # Dry-run: only runs when you trigger the workflow manually (workflow_dispatch).
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write             # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    # Real release: only runs when a version tag is pushed.
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write             # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
