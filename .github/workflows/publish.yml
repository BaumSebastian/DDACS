name: Publish to PyPI

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"    # real release: bumpver tags like 3.1.4 (no "v" prefix)
  workflow_dispatch:              # dry-run: "Run workflow" button -> publishes to TestPyPI

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - uses: actions/upload-artifact@v4    # hand the built dist/ to the publish jobs
        with:
          name: dist
          path: dist/

  testpypi:
    # Dry-run: only runs when you trigger the workflow manually (workflow_dispatch).
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write             # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    # Real release: only runs when a version tag is pushed.
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write             # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── Discovery surfaces ───────────────────────────────────────────────────
  # Kernels track every release (they pip-install ddacs at run time on Kaggle);
  # the teaser datasets only change when the DaRUS data does, i.e. on majors.

  kaggle-kernels:
    # Every release: refresh the six tutorial notebooks on Kaggle.
    if: github.event_name == 'push'
    needs: pypi
    runs-on: ubuntu-latest
    environment: kaggle
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait until PyPI serves the released version
        # The PyPI CDN can lag a few minutes behind the upload; kernels run
        # `pip install ddacs` on Kaggle right after the push, so hold the push
        # until the new version actually resolves.
        run: |
          for i in $(seq 1 30); do
            if python -m pip download "ddacs==${{ github.ref_name }}" --no-deps -q -d /tmp/pypi-check; then
              echo "ddacs ${{ github.ref_name }} is installable"; exit 0
            fi
            echo "not on the index yet — retry $i/30 in 20s"; sleep 20
          done
          echo "gave up waiting for PyPI after 10 min" >&2; exit 1

      - name: Push tutorial kernels
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python -m pip install --upgrade kaggle
          ./publish/kaggle/kernels/push.sh

  fetch-teaser:
    # Major release (X.0.0): the dataset content on DaRUS changed. Download the
    # small bundle ONCE and hand it to both uploaders as an artifact, so one
    # release costs one DaRUS download.
    if: github.event_name == 'push' && endsWith(github.ref_name, '.0.0')
    needs: pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch teaser data from DaRUS
        run: |
          python -m pip install --upgrade ddacs
          ddacs download --small -y --quiet --out data
          ddacs download --files ddacs_documentation.pdf -y --quiet --out data

      - uses: actions/upload-artifact@v4
        with:
          name: teaser-data
          path: data/
          retention-days: 1

  kaggle-dataset:
    needs: fetch-teaser
    runs-on: ubuntu-latest
    environment: kaggle
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: teaser-data
          path: data/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upload dataset version
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python -m pip install --upgrade kaggle
          DDACS_TEASER_SRC="$PWD/data" ./publish/kaggle/upload.sh version

  huggingface:
    needs: fetch-teaser
    runs-on: ubuntu-latest
    environment: huggingface
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: teaser-data
          path: data/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upload teaser to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m pip install --upgrade huggingface_hub
          HF_REPO=BaumSebastian/ddacs-teaser DDACS_TEASER_SRC="$PWD/data" \
            ./publish/huggingface/upload.sh

  zenodo:
    needs: fetch-teaser
    runs-on: ubuntu-latest
    environment: zenodo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: teaser-data
          path: data/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upload teaser to Zenodo (new-version DRAFT — publish manually)
        env:
          ZENODO_API_TOKEN: ${{ secrets.ZENODO_API_TOKEN }}
        run: |
          python -m pip install --upgrade requests
          DDACS_TEASER_SRC="$PWD/data" ./publish/stage_teaser.sh
          # dataset version, not package version: major tag 4.0.0 -> record version 4.0
          # No --publish: review the draft on zenodo.org (publication date, text),
          # then publish it there.
          TAG="${{ github.ref_name }}"
          python publish/zenodo/upload.py --version "${TAG%.0}"
