site_name: DDACS Documentation
site_url: https://ddacs.readthedocs.io
site_description: Deep Drawing and Cutting Simulations Dataset - Python interface
site_author: Sebastian Baum

repo_name: BaumSebastian/DDACS
repo_url: https://github.com/BaumSebastian/DDACS

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - toc.follow
    - content.code.copy

watch:
  - ddacs
  - docs/macros.py

plugins:
  - search
  - macros:
      module_name: docs/macros
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Dataset:
      - Overview: dataset.md
      - Process Parameters: process-parameters.md
      - HDF5 Structure: hdf5-structure.md
      - Croissant Manifest: croissant.md
  - Tutorials:
      - Overview: tutorials/index.md
      - 1. Getting Started: tutorials/getting-started.md
      - 2. Build your own view: tutorials/views.md
      - 3. PyTorch training: tutorials/pytorch.md
      - 4. Visualization: tutorials/visualization.md
      - 5. Loose HDF5 recipe: tutorials/loose-h5.md
  - CLI Reference: cli.md
  - API Reference:
      - Overview: api/index.md
      - Croissant: api/croissant.md
      - HDF5: api/h5.md
      - PyTorch: api/pytorch.md
      - Visualization: api/visualization.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BaumSebastian/DDACS
